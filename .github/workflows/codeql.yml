name: "CodeQL"
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

# Concurrency må stå i calleren - en delt workflow lager ingen egen run.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Minste privilegium: toppnivået nullstiller alle token-rettigheter, hver jobb deklarerer eksplisitt det den trenger.
permissions: {}

jobs:
  analyze:
    # Delt workflow i metarepoet, se https://github.com/navikt/tiltakspenger/blob/main/.github/workflows/README.md
    # security-events: write for opplasting til code scanning.
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: navikt/tiltakspenger/.github/workflows/codeql-gradle.yml@main
    with:
      java-version: '25'
