name: Build and deploy

# Trigges av push til main gjort av et menneske/agent (GitHub-knappen eller gh CLI).
# Merger dependabot-auto-merge-workflowen en PR med GITHUB_TOKEN, trigges denne workflowen ikke
# (GitHub starter ikke workflows fra pushes gjort med GITHUB_TOKEN).
# Dependabot-merger bygges og deployes derfor først ved neste vanlige push til main.
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitattributes'
      - '.gitHooks/**'
      - '.gitignore'
      - '.idea/**'
      - '.nais/alerts.yml'
      - 'clean_lint_and_build.sh'
      - 'CODEOWNERS'
      - 'doc/**'
      - 'docker-compose/**'
      - 'docs/**'
      - 'LICENSE'
      - 'lint_and_build.sh'

jobs:
  build:
    name: Test, build and push
    uses: ./.github/workflows/.test-and-build.yml
    permissions:
      contents: read
      id-token: write
    secrets:
      SLACK_VARSEL_WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}

  deploy-dev:
    name: Deploy to NAIS dev
    needs: build
    uses: ./.github/workflows/.deploy-to-nais.yml
    permissions:
      contents: read
      id-token: write
    with:
      NAIS_ENV: dev
      IMAGE: ${{ needs.build.outputs.IMAGE }}

  deploy-prod:
    name: Deploy to NAIS prod
    needs: build
    uses: ./.github/workflows/.deploy-to-nais.yml
    permissions:
      contents: read
      id-token: write
    with:
      NAIS_ENV: prod
      IMAGE: ${{ needs.build.outputs.IMAGE }}
