name: Build and deploy

# Trigges av push til main gjort av et menneske/agent (GitHub-knappen eller gh CLI).
# Merger dependabot-auto-merge-workflowen en PR med GITHUB_TOKEN, trigges denne workflowen ikke
# (GitHub starter ikke workflows fra pushes gjort med GITHUB_TOKEN).
# Dependabot-merger bygges og deployes derfor først ved neste vanlige push til main.

# Raske påfølgende pushes (f.eks. flere dependabot-merger) ga overlappende NAIS-rollouts,
# der eldre deployer timet ut på readiness-proben og i verste fall vant over nyere (2026-07-16).
# Kjør deployene serielt; ved flere ventende kjøringer vinner den nyeste.
concurrency:
  group: build-and-deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitattributes'
      - '.gitHooks/**'
      - '.gitignore'
      - '.idea/**'
      - '.nais/alerts.yml'
      - 'clean_lint_and_build.sh'
      - 'CODEOWNERS'
      - 'doc/**'
      - 'docker-compose/**'
      - 'docs/**'
      - 'LICENSE'
      - 'lint_and_build.sh'

# Minste privilegium: toppnivået nullstiller alle token-rettigheter, hver jobb deklarerer eksplisitt det den trenger.
permissions: {}

# Delte workflows i metarepoet, se https://github.com/navikt/tiltakspenger/blob/main/.github/workflows/README.md
jobs:
  build:
    name: Test and build
    uses: navikt/tiltakspenger/.github/workflows/test-og-bygg-gradle.yml@main
    permissions:
      contents: read
      id-token: write
    secrets:
      SLACK_VARSEL_WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}

  deploy-dev:
    name: Deploy to NAIS (dev)
    needs: build
    uses: navikt/tiltakspenger/.github/workflows/deploy-nais.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      NAIS_ENV: dev
      # Arena kjører on-prem.
      cluster-suffiks: fss
      IMAGE: ${{ needs.build.outputs.IMAGE }}

  deploy-prod:
    name: Deploy to NAIS (prod)
    needs: build
    uses: navikt/tiltakspenger/.github/workflows/deploy-nais.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      NAIS_ENV: prod
      # Arena kjører on-prem.
      cluster-suffiks: fss
      IMAGE: ${{ needs.build.outputs.IMAGE }}
