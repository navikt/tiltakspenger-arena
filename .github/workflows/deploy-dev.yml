name: Build, push and deploy to dev (manual)

on:
  workflow_dispatch:

# Minste privilegium: toppnivået nullstiller alle token-rettigheter, hver jobb deklarerer eksplisitt det den trenger.
permissions: {}

# Delte workflows i metarepoet, se https://github.com/navikt/tiltakspenger/blob/main/.github/workflows/README.md
jobs:
  build:
    name: Test and build
    uses: navikt/tiltakspenger/.github/workflows/test-og-bygg-gradle.yml@main
    permissions:
      contents: read
      id-token: write
    secrets:
      SLACK_VARSEL_WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}

  deploy:
    name: Deploy to NAIS (dev)
    needs: build
    uses: navikt/tiltakspenger/.github/workflows/deploy-nais.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      NAIS_ENV: dev
      # Arena kjører on-prem.
      cluster-suffiks: fss
      IMAGE: ${{ needs.build.outputs.IMAGE }}
