name: Dependabot auto-merge
on:
  pull_request:
    branches:
      - main

# Minste privilegium: toppnivået nullstiller alle token-rettigheter, hver jobb deklarerer eksplisitt det den trenger.
permissions: {}

# Rebaser Dependabot mens en tidligere kjøring fortsatt bygger, feiler den gamle kjøringen på --match-head-commit og gir falskt feilvarsel.
# Kansellering løser det: ny kjøring på samme PR avbryter den gamle, og kansellerte kjøringer regnes ikke som failure().
# Må stå i calleren - en delt workflow lager ingen egen run, så concurrency på toppnivå der ignoreres.
concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot:
    # Selve logikken bor i den delte workflowen i metarepoet, se navikt/tiltakspenger#31.
    # Konvensjoner og caller-eksempel: https://github.com/navikt/tiltakspenger/blob/main/.github/workflows/README.md
    # contents: write for å merge PR-en, pull-requests: write for gh pr merge.
    permissions:
      contents: write
      pull-requests: write
    uses: navikt/tiltakspenger/.github/workflows/dependabot-auto-merge.yml@main
    # Send kun det den delte workflowen trenger - `secrets: inherit` ville eksponert alle Dependabot-secrets (også org-delte) for metarepoets workflow.
    secrets:
      SLACK_VARSEL_WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}
    with:
      java-version: '25'
