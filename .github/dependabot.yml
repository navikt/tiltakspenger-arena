version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    ignore:
      # Ktor er bevisst låst til 3.4-linja: 3.5.x introduserte en alvorlig bug i ktor-klienten som blokkerte alle kall like lenge som max timeout.
      # Buggen tok ned søknaden i over 1,5 time og rammet mange andre Nav-tjenester.
      # Vi migrerer gradvis vekk fra ktor-klienten (til httpklient); låsen oppheves når klientbruken er borte.
      # Netty-sikkerhetsfikser tas i mellomtiden via netty-bom-pinnen i build.gradle.kts og bom-en fra libs' ktor-common, ikke via ktor-bump.
      - dependency-name: "io.ktor:*"
        versions: [">=3.5.0, <3.6.0"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
