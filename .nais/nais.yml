apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: tiltakspenger-arena
  namespace: tpts
  labels:
    team: tpts
spec:
  image: {{ image }}
  port: 8080
  ingresses:
    - {{ ingress.url }}
  resources:
    limits:
      memory: 1500Mi
    requests:
      memory: 750Mi
  azure:
    application:
      enabled: true
  tokenx:
    enabled: true
  accessPolicy:
    outbound:
      rules:
        - application: logging
          namespace: nais-system
    inbound:
      rules:
        - application: tiltakspenger-tiltak
          namespace: tpts
          cluster: {{ cluster }}
        - application: tiltakspenger-datadeling
          namespace: tpts
          cluster: {{ cluster }}
        - application: tiltakspenger-saksbehandling-api
          namespace: tpts
          cluster: {{ cluster }}
  # Prober følger felles mal, se «Delte konvensjoner» i navikt/tiltakspenger AGENTS.md. Avvik skal begrunnes med kommentar her.
  startup:
    path: /isalive
    initialDelay: 5
    periodSeconds: 5
    failureThreshold: 60
    timeout: 3
  liveness:
    path: /isalive
    periodSeconds: 10
    failureThreshold: 3
    timeout: 3
  readiness:
    path: /isready
    periodSeconds: 5
    failureThreshold: 1
    timeout: 3
  prometheus:
    enabled: true
    path: /metrics
  strategy:
    type: RollingUpdate
  replicas:
    min: 2
    max: 2
  kafka:
    pool: {{ kafka.pool }}
  webproxy: true
  vault:
    enabled: true
    paths:
      - kvPath: {{ vault_db_config_path }}
        mountPath: /secrets/dbconfig
      - kvPath: {{ vault_db_creds_path }}
        mountPath: /secrets/dbcreds
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: elastic
        - id: loki